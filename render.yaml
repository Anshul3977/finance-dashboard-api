services:
  - type: web
    name: finance-api
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromEnv: DATABASE_URL
      - key: JWT_SECRET
        fromEnv: JWT_SECRET
